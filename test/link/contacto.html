        </ul>
      </nav>
    </header>
    <main>
      <section id="contacto">
        <form action="">
          <div class="contacto">
            <h2>Ingreso de datos</h2>
            <div class="datos">
              <label for="nombre">Nombre</label>
              <input type="text" name="nombre" id="nombre" />
            </div>
            <div class="datos">
              <label for="apellido">Apellido</label>
              <input type="text" name="apellido" id="apellido" />
            </div>
            <div class="datos">
              <label for="email">Correo</label>
              <input type="email" name="email" id="email" />
            </div>
            <div class="datos">
              <label for="telefono">Telefono</label>
              <input type="tel" name="telefono" id="telefono" />
            </div>
            <div class="datos">
              <p>Sexo</p>

              <label for="masculino">
                <input
                  type="radio"
                  name="sexo"
                  id="masculino"
                  value="masculino"
                />
                Masculino
              </label>

              <label for="femenino">
                <input
                  type="radio"
                  name="sexo"
                  id="femenino"
                  value="femenino"
                />
                Femenino
              </label>
            </div>
            <div class="datos">
              <p>Ingrese un comentario ("Opcional")</p>
              <textarea name="comentario" id="comentario"></textarea>
            </div>
            <div class="datos">
              <button type="submit">Enviar</button>
              <button type="reset">Reset</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <footer>

        <p class="footer-p">

        </p>
        <p class="footer-p">Diseñado y desarrollado por Daniel Morales</p>
      </div>
